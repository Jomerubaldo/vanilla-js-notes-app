<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" type="text/css" href="style.css" />
  <title>Notes App</title>
</head>

<body>
  <div class="app-wrapper">
    <header>
      <h1>Notes</h1>
      <p><span id="countTask">0</span></p>
    </header>
    <div class="container-input">
      <input class="search" type="search" placeholder="🔍 Search notes..." />
    </div>
    <div id="containerNote" class="container-note"> <!--Dapat click dapat makikita yung buong text at my etc pa-->
      <!-- <h3 id="noteTitle" class="note-title"></h3></br>
      <p id="noteParagraph" class="note-paragraph"></p><br />
      <p id="noteTime" class="note-time">YESTERDAY</p><br /> -->
      <!-- <hr id="horizontalLine" /> -->
    </div>
    <div class="container-button">
      <button id="addButton" class="add-button">+</button>
    </div>
  </div>

  <!-- add modal  -->
  <div id="editModal" class="modal">
    <div id="modal-content">
      <div class="edit-title">
        <h2>Add Note</h2>
      </div>
      <div class="input-container">
        <div class="task-name">Title</div>
        <div>
          <input name="task" id="modalInput" class="modal-input" type="text" placeholder="Note title..." />
        </div>
      </div><br />
      <div class="input-container">
        <div class="task-name">Note</div>
        <textarea id="textArea" class="text-area" rows="13" cols="38" placeholder="Start typing your thoughts...">
        </textarea>
      </div>
      <div class="modal-button">
        <button id="saveNotes" class="save-edit">Add note</button>
        <button id="cancelEdit" class="cancel-edit">Cancel</button>
      </div>
    </div>
  </div>
</body>
<script src="function.js"></script>

</html>
