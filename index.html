<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="#">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="/css/main.css">
  <title>Notes</title>
</head>

<body>

  <!-- ═══════════════════════════════════════════════
       APP SHELL  (sidebar + detail panel on desktop)
  ════════════════════════════════════════════════ -->
  <div class="app-shell">

    <!-- ── LEFT PANEL / SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <!-- Header -->
        <header class="sidebar-header">
          <div class="brand">
            <h1 class="brand-title">Notes</h1>
          </div>
          <button class="icon-btn" id="addButton" title="New note" aria-label="New note">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </header>

        <!-- Search -->
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input class="search-input" type="search" placeholder="Search notes…" id="searchInput">
        </div>

        <!-- Notes count badge -->
        <div class="notes-meta">
          <span class="notes-label">All Notes</span>
          <span class="notes-count" id="countTask">0</span>
        </div>

        <!-- Notes list -->
        <div class="notes-list" id="containerNote"></div>

      </div><!-- /sidebar-inner -->
    </aside>

    <!-- ── DETAIL / EMPTY STATE PANEL ── -->
    <main class="detail-panel" id="detailPanel">

      <!-- Empty state (shown when no note selected) -->
      <div class="empty-state" id="emptyState">
        <h2 class="empty-title">No note selected</h2>
        <p class="empty-sub">Pick a note from the list or create a new one.</p>
        <button class="btn-primary" id="emptyAddBtn">New Note</button>
      </div>

      <!-- Note viewer (shown when a note is selected) -->
      <div class="note-viewer" id="noteViewer" style="display:none">
        <div class="viewer-toolbar">
          <!-- Back button only visible on mobile -->
          <button class="icon-btn mobile-back" id="mobileBack" title="Back" aria-label="Back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5m0 0 7 7m-7-7 7-7" />
            </svg>
          </button>
          <div class="viewer-actions">
            <button class="btn-ghost" id="editViewModal">Edit</button>
            <button class="btn-danger" id="deleteViewModal">Delete</button>
          </div>
        </div>
        <div class="viewer-body">
          <h2 class="viewer-title" id="viewNoteTitle"></h2>
          <p class="viewer-date" id="viewNoteDate"></p>
          <textarea class="viewer-content" id="viewNoteParagraph" readonly></textarea>
        </div>
      </div>

    </main>

  </div><!-- /app-shell -->

  <!-- ── FAB (mobile only) ── -->
  <button class="fab" id="fabBtn" title="New note" aria-label="New note">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white"
      stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14" />
    </svg>
  </button>

  <!-- ═══════════════════════════════════════════════
       ADD / EDIT MODAL
  ════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="modalHeading">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-heading" id="modalHeading">New Note</h2>
        <button class="icon-btn" id="headerCloseModal" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="form-group">
        <label class="form-label" for="modalInput">Title</label>
        <input id="modalInput" class="form-input" type="text" placeholder="Note title…" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label" for="textArea">Note</label>
        <textarea id="textArea" class="form-textarea" rows="10" placeholder="Start typing your thoughts…"></textarea>
      </div>

      <div class="modal-footer">
        <button id="cancelEdit" class="btn-ghost">Cancel</button>
        <button id="saveAddNotes" class="btn-primary">Save Note</button>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>

</html>
