<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="#">
  <link rel="stylesheet" type="text/css" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <title>Notes App</title>
</head>

<body>
  <div class="app-wrapper">
    <header>
      <h1>Notes</h1>
      <p><span id="countTask">0</span></p>
    </header>
    <div class="container-input">
      <input class="search" type="search" placeholder="🔍 Search notes..." />
    </div>
    <div id="containerNote">
      <!--Dapat click dapat makikita yung buong text at my etc pa-->
      <!-- <p id="noteTime" class="note-time">YESTERDAY</p><br /> -->
      <!-- <hr id="horizontalLine" /> -->
    </div>
    <div class="container-add-button">
      <button id="addButton" class="add-button">+</button>
    </div>
  </div>

  <!-- add notes modal  -->
  <div id="editModal" class="add-modal-container">
    <div class="add-modal-content">
      <div class="edit-title">
        <h2>Add Note</h2>
      </div>
      <div class="input-container">
        <div class="task-name">Title</div>
        <div>
          <input name="task" id="modalInput" class="modal-input" type="text" placeholder="Note title..." />
        </div>
      </div><br />
      <div class="input-container">
        <div class="task-name">Note</div>
        <textarea id="textArea" class="text-area" rows="13" cols="38" placeholder="Start typing your thoughts...">
        </textarea>
      </div>
      <div class="modal-button">
        <button id="saveAddNotes" class="save-edit">Add note</button>
        <button id="cancelEdit" class="cancel-edit">Cancel</button>
      </div>
    </div>
  </div>

  <!-- view notes modal -->

  <div class="view-modal-container" id="viewModalContainer">
    <div class="view-modal-content" id="viewModalContent">
      <div class="header-viewModal">
        <button id="closeViewModal">⬅</button>
        <h2>✍🏻</h2>
      </div>
      <h3 class="viewTitle" id="viewNoteTitle"></h3>
      <p class="viewParagraph" id="viewNoteParagraph"></p>
    </div>
  </div>

</body>
<script src="function.js"></script>

</html>
